# .github/workflows/ci.yml
name: CI Pipeline - Auto Test & Security Scan

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ========== 任务1：环境检查 ==========
  check-environment:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 显示仓库内容
        run: |
          echo "仓库内容列表："
          ls -la
          echo "当前时间："
          date

      - name: 打印欢迎信息
        run: echo "🎉 CI 流水线已成功触发！"

  # ========== 任务2：接口自动化测试 ==========
  api-test-demo:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行接口测试
        run: python test_api.py

  # ========== 任务3：安全扫描 ==========
  security-scan-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 运行 MobSF 静态代码扫描
        uses: MobSF/mobsfscan@main
        with:
          args: '. --sarif --output results.sarif || true'
      
      # 👇 新增：上传报告到 GitHub Security 页面
      - name: 上传 SARIF 到 GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: results.sarif
